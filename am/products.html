      </div>
    </div>

  <header class="page-hero products-hero">
    <div class="layout-shell hero-grid">

    </div>

      <div class="search">
        <label for="product-search" class="visually-hidden">ምርቶችን ይፈልጉ</label>

      <div class="product-list"></div>
    </aside>

    <section class="product-detail"></section>

          <h2 class="footer-subtitle">Sheger Bread & Flour</h2>
